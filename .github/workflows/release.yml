name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file exe
        run: |
          dotnet publish FerrariX.csproj -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o publish

      - name: Crear ZIP (exe + placeholder Xeno.dll)
        run: |
          New-Item -Path publish -Name "PON_AQUI_Xeno.dll" -ItemType File | Out-Null
          Compress-Archive -Path publish\FerrariX.exe, publish\PON_AQUI_Xeno.dll `
            -DestinationPath FerrariX-${{ github.ref_name }}.zip

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          files: FerrariX-${{ github.ref_name }}.zip
          body: |
            ## FerrariX ${{ github.ref_name }}

            ### Instalación
            1. Descarga el ZIP y extrae en una carpeta
            2. Copia `Xeno.dll` (de tu instalación de Xeno) en la misma carpeta
            3. Ejecuta `FerrariX.exe` — no requiere instalar nada más

            ### Requisitos
            - Windows 10/11 x64
            - Xeno instalado (para obtener `Xeno.dll`)
